<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Travel India</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body style="background-color: var(--light-bg); padding-top: var(--header-height);">

    <!-- Header Navigation -->
    <header class="navbar navbar-dark scrolled">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <h1>Travel India</h1>
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="blogs.html">Blogs</a>
                <a href="about.html">About</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
            <button class="hamburger" aria-label="Toggle Navigation">&#9776;</button>
        </div>
    </header>

    <section class="section container" style="max-width: 800px; padding-top: var(--spacing-xxl);">
        <div class="section-header text-center reveal-up">
            <h1 class="h1-title">Contact Us</h1>
            <p style="margin: 0 auto;">Have a question or feedback? We'd love to hear from you.</p>
        </div>

        <div class="card reveal-up stagger-1" style="padding: var(--spacing-xl); box-shadow: var(--shadow-lg);">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="message" class="form-label">Your Message</label>
                    <textarea id="message" class="form-control" rows="5" placeholder="How can we help you?"
                        required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" style="background-color: transparent;">
        <div class="container">
            <div class="footer-bottom" style="border: none;">
                <p>&copy; 2026 Travel India Blog. Designed for explorers.</p>
            </div>
        </div>
    </footer>

    <!-- JS -->
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
